<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanessa Abdão</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .hero-bg {
      background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://lucasabdao.github.io/vanessaabdao/family-christmas.jpg');
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body class="font-sans">

  <!-- Navigation -->
  <nav class="fixed top-0 w-full bg-white shadow-md z-50 py-5">
    <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-pink-600">Vanessa Abdão</h1>
      <a href="https://www.instagram.com/vanessaabdao/" target="_blank" 
         class="bg-pink-600 text-white px-6 py-3 rounded-full flex items-center gap-2 hover:bg-pink-700">
        <i class="fab fa-instagram"></i> Instagram
      </a>
    </div>
  </nav>

  <!-- Hero with your family photo -->
  <section id="home" class="hero-bg h-screen flex items-center text-white">
    <div class="max-w-6xl mx-auto px-6 text-center">
      <h2 class="text-5xl md:text-6xl font-bold mb-4">Olá, eu sou Vanessa Abdão</h2>
      <p class="text-3xl md:text-4xl mb-6">Mãe • Esposa • Criadora de Conteúdo</p>
      <p class="text-xl max-w-2xl mx-auto">Vivendo nos EUA com amor, fé e muita gratidão</p>
    </div>
  </section>

  <footer class="bg-gray-900 text-white py-10 text-center">
    <p>© 2026 Vanessa Abdão</p>
  </footer>

</body>
</html>
